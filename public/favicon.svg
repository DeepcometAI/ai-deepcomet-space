<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="cometGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0080ff"/>
      <stop offset="100%" style="stop-color:#00f5ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="70" cy="30" r="8" fill="url(#cometGradient)" filter="url(#glow)"/>
  <path d="M 70 30 Q 40 45 20 70" stroke="url(#cometGradient)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 65 35 Q 45 50 30 65" stroke="url(#cometGradient)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <circle cx="50" cy="50" r="35" stroke="url(#cometGradient)" stroke-width="1" fill="none" opacity="0.3"/>
  <circle cx="50" cy="50" r="45" stroke="url(#cometGradient)" stroke-width="0.5" fill="none" opacity="0.2"/>
</svg>
